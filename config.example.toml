# mcp-ssh configuration
# Copy to ~/.mcp-ssh/config.toml and customize as needed.

[session]
idle_timeout_minutes    = 30       # Close idle SSH sessions after N minutes
connect_timeout_seconds = 15       # Timeout for establishing SSH connections
command_timeout_seconds = 30       # Default timeout for command execution
max_output_bytes        = 1048576  # Truncate command output beyond 1 MB

[approval]
provider = "auto_deny"

# Commands allowed to execute without approval.
# Only the base command name is checked (e.g. "ls" matches "ls -la /tmp").
whitelist = [
  "ls", "pwd", "cat", "echo", "grep", "find", "wc",
  "head", "tail", "ps", "df", "du", "uname",
  "whoami", "env", "cd",
]

[server]
# addr is the listen address for `mcp-ssh serve` (StreamableHTTP mode).
# Overridable at runtime with --addr flag.
addr = ":7408"

[audit]
# max_size_mb: rotate audit.log when it exceeds this size (megabytes).
max_size_mb  = 128
# max_age_days: delete rotated log files older than this many days.
max_age_days = 3
# compress: gzip rotated log files to save disk space.
compress     = false
# victoria_logs_url: send structured audit JSON to VictoriaLogs.
# Set to the base URL (e.g. "http://host:9428"). Leave empty to discard JSON output.
victoria_logs_url = ""
